<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgMM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f94ad"/>
      <stop offset="100%" stop-color="#196e67"/>
    </linearGradient>
    <linearGradient id="hijabMM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6074"/>
      <stop offset="100%" stop-color="#19433f"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgMM)"/>

  <!-- shoulders / coat -->
  <path d="M75 365 C75 280 130 245 200 245 C270 245 325 280 325 365 Z" fill="#ffffff"/>
  <path d="M150 250 L165 360 L235 360 L250 250 Z" fill="#eef6f6"/>
  <circle cx="200" cy="252" r="6" fill="#dce9e9"/>
  <circle cx="200" cy="275" r="6" fill="#dce9e9"/>

  <!-- neck -->
  <rect x="183" y="195" width="34" height="40" rx="14" fill="#f0c9a3"/>

  <!-- face -->
  <ellipse cx="200" cy="168" rx="58" ry="66" fill="#f3d2ac"/>

  <!-- hijab draping over head and shoulders -->
  <path d="M118 175 C108 95 150 45 200 45 C250 45 292 95 282 175
           C282 200 270 222 255 232
           L255 365 L320 365
           C320 280 310 215 290 175
           C300 90 255 30 200 30
           C145 30 100 90 110 175
           C90 215 80 280 80 365
           L145 365 L145 232
           C130 222 118 200 118 175 Z"
        fill="url(#hijabMM)"/>

  <!-- hijab front edge framing the face -->
  <path d="M133 168 C130 105 160 60 200 60 C240 60 270 105 267 168
           C267 195 250 222 200 222 C150 222 133 195 133 168 Z"
        fill="none" stroke="#0e2a35" stroke-width="3" opacity="0.25"/>

  <!-- eyebrows -->
  <path d="M168 155 Q178 149 190 153" stroke="#5b3a26" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M210 153 Q222 149 232 155" stroke="#5b3a26" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="179" cy="168" rx="7" ry="9" fill="#3a2a1f"/>
  <ellipse cx="221" cy="168" rx="7" ry="9" fill="#3a2a1f"/>

  <!-- nose -->
  <path d="M198 172 Q196 184 200 188" stroke="#caa074" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- smile -->
  <path d="M180 200 Q200 214 220 200" stroke="#a05a4a" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="165" cy="188" rx="10" ry="6" fill="#e8a98c" opacity="0.45"/>
  <ellipse cx="235" cy="188" rx="10" ry="6" fill="#e8a98c" opacity="0.45"/>

  <!-- stethoscope -->
  <path d="M165 305 C165 330 180 345 200 345 C220 345 235 330 235 305"
        stroke="#1c4352" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="345" r="10" fill="#1c4352"/>
</svg>
